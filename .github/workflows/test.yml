name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install LibreOffice (required)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libreoffice
          elif [ "$RUNNER_OS" = "Windows" ]; then
            winget install --id TheDocumentFoundation.LibreOffice --silent --accept-package-agreements --accept-source-agreements
          fi
        shell: bash

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Skip easyocr (heavy torch dep) in CI; tests don't exercise OCR routes
          pip install flask "python-pptx>=1.0" "Pillow>=10.0" "opencv-python-headless>=4.8" "numpy>=1.24" pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -ra
